<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Círculo Trigonométrico Interactivo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <style>
        body { 
            background-color: #f8f9fa; 
            padding-top: 20px; 
            padding-bottom: 40px;
        }
        canvas {
            width: 100%;
            max-width: 500px;
            height: auto;
            aspect-ratio: 1 / 1;
        }
        /* Estilos de la pantalla de la calculadora */
        .latex-screen {
            height: 60px;
            background: #ffffff;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0.5rem 1rem;
            overflow-x: auto;
            font-size: 1.5rem;
            box-shadow: inset 0 1px 2px rgba(0,0,0,.075);
        }
        .calc-btn {
            font-size: 1.1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<header class="container mb-4 text-center">
    <h2 class="fw-bold">Simulador del Círculo Trigonométrico</h2>
    <p class="text-muted">Análisis de funciones, reducción al primer cuadrante y notación matemática</p>
</header>

<main class="container">
    <div class="row">
        <section class="col-lg-6 mb-4 d-flex flex-column align-items-center">
            <figure class="w-100 d-flex flex-column align-items-center m-0">
                <canvas id="trigCanvas" width="500" height="500" class="border rounded shadow-sm bg-white"></canvas>
                
                <figcaption id="infoPanel" class="w-100 mt-4 border rounded bg-white shadow-sm overflow-hidden" style="max-width: 500px;">
                </figcaption>
            </figure>
        </section>

        <aside class="col-lg-6">
            <article class="card shadow-sm mb-4">
                <header class="card-header bg-dark text-white">
                    <h5 class="mb-0">Calculadora de Ángulos</h5>
                </header>
                <div class="card-body bg-light">
                    <div id="latexScreen" class="latex-screen mb-3">
                        <span class="text-muted fs-6">Ingrese un ángulo...</span>
                    </div>
                    
                    <div class="row g-2">
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('7')">7</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('8')">8</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('9')">9</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-primary w-100 calc-btn" onclick="btnPress('/')">÷</button></div>
                        
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('4')">4</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('5')">5</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('6')">6</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-primary w-100 calc-btn" onclick="btnPress('*')">×</button></div>
                        
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('1')">1</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('2')">2</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('3')">3</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-primary w-100 calc-btn" onclick="btnPress('-')">-</button></div>
                        
                        <div class="col-3"><button type="button" class="btn btn-danger w-100 calc-btn" onclick="btnPress('C')">C</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-dark w-100 calc-btn" onclick="btnPress('0')">0</button></div>
                        <div class="col-3"><button type="button" class="btn btn-info w-100 calc-btn fw-bold" onclick="btnPress('pi')">π</button></div>
                        <div class="col-3"><button type="button" class="btn btn-outline-primary w-100 calc-btn" onclick="btnPress('+')">+</button></div>
                        
                        <div class="col-6"><button type="button" class="btn btn-secondary w-100 calc-btn" onclick="btnPress('DEL')">← Borrar</button></div>
                        <div class="col-6"><button type="button" class="btn btn-success w-100 calc-btn" onclick="applyCalc()">Graficar</button></div>
                    </div>
                </div>
            </article>

            <article class="card shadow-sm mb-4">
                <header class="card-header bg-primary text-white">
                    <h5 class="mb-0">Ángulos Notables</h5>
                </header>
                <div class="card-body">
                    <nav class="btn-group w-100" aria-label="Botones de ángulos notables">
                        <button type="button" class="btn btn-outline-primary fw-bold" onclick="setAngleFromButton(0, '0', 1)">0</button>
                        <button type="button" class="btn btn-outline-primary fw-bold" onclick="setAngleFromButton(Math.PI/6, 'pi/6', 6)">π/6</button>
                        <button type="button" class="btn btn-outline-primary fw-bold" onclick="setAngleFromButton(Math.PI/4, 'pi/4', 4)">π/4</button>
                        <button type="button" class="btn btn-outline-primary fw-bold" onclick="setAngleFromButton(Math.PI/3, 'pi/3', 3)">π/3</button>
                        <button type="button" class="btn btn-outline-primary fw-bold" onclick="setAngleFromButton(Math.PI/2, 'pi/2', 2)">π/2</button>
                    </nav>
                </div>
            </article>
        </aside>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
